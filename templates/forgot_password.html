<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Reset Password</title>
</head>
<body>
    <h2>Reset Password</h2>
    <form action="/forgot/password" method="POST">
        <label>Email:</label><br>
        <input type="email" name="email" required><br>

        <input type="submit"><br>
        <label>{{ message }}</label>
    </form>
</body>
</html>
